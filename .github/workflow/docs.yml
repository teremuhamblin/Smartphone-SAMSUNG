name: Documentation Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y sbcl rustc default-jdk pandoc nodejs npm

      - name: Run documentation pipeline
        run: bash tools/pipeline.sh

      - name: Upload public site
        uses: actions/upload-artifact@v4
        with:
          name: samsung-docs
          path: public/
